<template id="country-card-template">
  <article class="country-card">
    <div class="country-card__image-wrapper">
      <img class="country-card__image" />
      <button class="country-card__favorite" aria-label="Add to favorites"></button>
    </div>

    <div class="country-card__body">
      <div class="country-card__top">
        <h3 class="country-card__name"></h3>
        <span class="country-card__region"></span>
      </div>

      <div class="country-card__details">
        <span>Capital:</span>
        <span class="country-card__capital"></span>

        <span>Population:</span>
        <span class="country-card__population"></span>

        <span>Currency:</span>
        <span class="country-card__currency"></span>
      </div>

      <button class="country-card__button">View Details</button>
    </div>
  </article>
</template>
